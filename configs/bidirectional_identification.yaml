protocol_id: boichitro_bidirectional_id_v1
source_protocol_id: boichitro_q1_v1
source_variant: M3__base
variant_id: M3B_BIDIR
seeds: [1701, 2903, 4307]
mntp:
  token_budget: 5000000
  mask_probability: 0.15
  masking_policy: bert_80_10_10
  mixture:
    identification: 0.70
    dialect_clm: 0.30
  trainer:
    epochs: 1
    micro_batch_size: 64
    gradient_accumulation_steps: 16
    muon_lr: 0.006
    adamw_lr: 0.0001
    router_lr: 0.00015
    weight_decay: 0.10
    warmup_fraction: 0.05
    min_lr_ratio: 0.10
    gradient_clip: 1.0
    groupdro_eta: 0.01
    groupdro_uniform_mix: 0.10
    groupdro_max_ratio: 10.0
    adversary_ramp_fraction: 0.10
    num_workers: 2
    log_every_steps: 10
    early_stopping_patience: 1
    save_optimizer_state: false
identification:
  contrastive_loss_weight: 0.10
  contrastive_temperature: 0.07
  trainer:
    epochs: 20
    micro_batch_size: 128
    gradient_accumulation_steps: 4
    muon_lr: 0.004
    adamw_lr: 0.0001
    router_lr: 0.00015
    weight_decay: 0.10
    warmup_fraction: 0.05
    min_lr_ratio: 0.10
    gradient_clip: 1.0
    groupdro_eta: 0.01
    groupdro_uniform_mix: 0.10
    groupdro_max_ratio: 10.0
    adversary_ramp_fraction: 0.10
    num_workers: 2
    log_every_steps: 20
    validate_every_epochs: 1
    early_stopping_patience: 4
    selection_metric: objective
    selection_mode: max
    selection_tolerance: 0.002
    selection_tie_breaker: ece_15
    selection_tie_mode: min
    save_optimizer_state: false
    retain_last_checkpoint: false
evaluation:
  batch_size: 256
  test_access: forbidden_during_training
