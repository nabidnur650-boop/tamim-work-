seeds: [1701, 2903, 4307]
training_token_budget_per_seed: 2000000
block_size: 256
micro_batch_size: 32
learning_rate: 0.0005
weight_decay: 0.1
warmup_fraction: 0.05
min_lr_ratio: 0.1
gradient_clip: 1.0
evaluation_rows_per_dialect: 200
model:
  n_layers: 6
  d_model: 256
  n_heads: 4
  n_kv_heads: 2
  dense_ffn_dim: 768
  dropout: 0.0
selection:
  global_bpc_relative_to_best_max: 1.01
  token_cost_relative_to_best_max: 1.07
  final_objective: minimum_worst_dialect_bpc

