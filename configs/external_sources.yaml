huggingface:
  - source_id: hf_bengali_regional_asr_refine
    repo_id: sha1779/bengali_regional_dataset_refine
    revision: 6e3221bdf7f9c8c426276f1b619d7de597963f42
    decision: admit_conditional
    role: authentic_identification_transcript_candidate
    expected_license: apache-2.0
    selected_columns: [transcriptions, district]
    exact_label_map:
      barishal: BAR
      chittagong: CHI
      kishoreganj: KIS
      narail: NAR
      narsingdi: NSD
      rangpur: RAN
      sylhet: SYL
      tangail: TAN
    excluded_unmapped_labels: [habiganj, sandwip]
    note: >-
      District names are mapped only on exact taxonomy matches. Habiganj and
      Sandwip are retained in the audit but are not collapsed into another
      dialect by geographic inference.

  - source_id: hf_chittagonian_vulgar_lexicon
    repo_id: kit-nlp/Vulgar_Lexicon_of_Chittagonian_Dialect_of_Bangla_or_Bengali
    revision: ce4be3814b8eca1a4c0fa85f983625565f887088
    decision: admit_auxiliary_only
    role: tokenizer_and_safety_lexicon_only
    expected_license: apache-2.0
    selected_files: [Vulgar Word.csv]
    dialects: [CHI]

huggingface_rejections:
  - repo_id: TanjimKIT/Vulgar_Lexicon_of_Chittagonian_Dialect_of_Bangla_or_Bengali
    reason: exact_blob_duplicate_of_kit_nlp_release
  - repo_id: TanjimKIT/Cyberbullying-detection-in-Chittagonian-dialect-of-Bangla-CBDCB
    reason: gated_and_genre_narrow_not_needed_for_core_tasks
  - repo_id: Regional-TinyStories/bangla-generated_4o-mini_2M
    reason: no_dataset_card_no_license_fully_synthetic_4_76GB
  - repo_id: sha1779/Bengali_Regional_dataset
    reason: no_card_no_license_and_superseded_by_refined_release

synthetic_policy:
  allowed_source_split: train
  task: normalization_robustness_only
  authenticity_claim: false
  classification_eligible: false
  maximum_fraction_of_authentic_train_per_dialect: 0.15
  maximum_total_fraction: 0.10
  parent_id_required: true
  methods:
    - terminal_punctuation_variant
    - single_safe_boundary_join
    - quote_and_dash_typography_variant
  forbidden:
    - protected_validation_or_test_parent
    - label_transfer
    - untraceable_llm_generation
    - synthetic_validation_or_test
    - geographic_label_inference
