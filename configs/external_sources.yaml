taxonomy:
  version: boichitro_taxonomy_v1
  labels:
    BAR: Barishal
    CHI: Chittagong
    KHU: Khulna
    KIS: Kishoreganj
    MYM: Mymensingh
    NAR: Narail
    NOA: Noakhali
    NSD: Narsingdi
    RAJ: Rajshahi
    RAN: Rangpur
    SYL: Sylhet
    TAN: Tangail
    STD: Standard Bangla
  note: >-
    This is a 13-label inventory: 12 regional labels plus Standard Bangla.
    It is not a claim that the archive contains 13 regional dialects.

