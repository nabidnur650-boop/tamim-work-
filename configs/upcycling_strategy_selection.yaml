    role: negative_control
  random_initialization:
    run_id: P_M2_SCRATCH_20M
    role: negative_control
  annealed_cross_bank:
    run_id: P_M2_ANNEALED_20M
    role: candidate
    model_overrides:
      banked_upcycle_fraction: 0.02
      banked_upcycle_release_fraction: 0.10
      banked_pairing_penalty: 0.25
  permanent_paired_bank:
    run_id: P_M2_PAIRED_20M
    role: candidate
    model_overrides:
      banked_upcycle_fraction: 1.0
      banked_upcycle_release_fraction: 1.0
