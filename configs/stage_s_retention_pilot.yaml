token_budget: 6000000
validation_checkpoints: 6
normalization_validation_limit: null
replay_validation_examples: 2048
replay_degradation_limit: 0.05
selection:
  primary: validation_macro_chrfpp
  constraint: replay_relative_degradation_lte_0.05
  tie_breakers:
    - validation_worst_dialect_chrfpp
    - lower_replay_relative_degradation
